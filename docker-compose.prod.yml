name: batchbook-prod

services:

  # ── Migration guard (one-shot) ──────────────────────────────────
  # Exits 0 if DB is at Alembic HEAD; exits 1 (and blocks backend) if not.
  # Bypass: make prod BYPASS_UPDATE=1
  alembic-check:
    image: batchbook-backend:prod
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      cache_from:
        - batchbook-backend:dev
        - batchbook-backend:prod
    command: ["sh", "/app/scripts/check_migrations.sh"]
    env_file:
      - .env
    environment:
      - BYPASS_MIGRATION_CHECK=${BYPASS_UPDATE:-0}
    networks:
      - batchbook

  # ── FastAPI backend ─────────────────────────────────────────────
  backend:
    image: batchbook-backend:prod        # named image = reusable cache source
    build:
      context: .
      dockerfile: Dockerfile
      target: prod                       # baked-in source, 2 uvicorn workers
      cache_from:
        - batchbook-backend:dev          # share base + dep layers with the dev image
        - batchbook-backend:prod         # reuse layers from the last prod build
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - batchbook
    restart: unless-stopped
    depends_on:
      alembic-check:
        condition: service_completed_successfully

  # ── React / nginx frontend ──────────────────────────────────────
  frontend:
    image: batchbook-frontend:prod       # named image = reusable cache source
    build:
      context: ./batchbookui
      dockerfile: Dockerfile
      target: prod                       # Vite build → nginx
      cache_from:
        - batchbook-frontend:dev         # share base + dep layers with the dev image
        - batchbook-frontend:prod        # reuse layers from the last prod build
      args:
        # Baked into the JS bundle at build time.
        # In prod, nginx proxies /student/* and /owner/* directly (see nginx.conf),
        # so VITE_API_URL can be left as "/" or a real domain if you skip nginx proxy.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "80:80"
    networks:
      - batchbook
    restart: unless-stopped
    depends_on:
      - backend

networks:
  batchbook:
    driver: bridge
